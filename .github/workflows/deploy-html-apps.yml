name: Deploy HTML Apps to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      app:
        description: Optional top-level folder to deploy. Leave empty to deploy every app.
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-html-apps-${{ github.ref }}
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.collect.outputs.matrix }}
      has_targets: ${{ steps.collect.outputs.has_targets }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Collect deploy targets
        id: collect
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          TARGET_APP: ${{ inputs.app }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            node .cloudflare/scripts/resolve-targets.mjs --mode manual --app "$TARGET_APP" > matrix.json
          elif [[ -z "$BEFORE_SHA" || "$BEFORE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            node .cloudflare/scripts/resolve-targets.mjs --mode manual > matrix.json
          else
            git diff --name-only "$BEFORE_SHA" "$GITHUB_SHA" | node .cloudflare/scripts/resolve-targets.mjs --mode changed > matrix.json
          fi

          echo "matrix=$(tr -d '\n' < matrix.json)" >> "$GITHUB_OUTPUT"

          if grep -q '"include":\[\]' matrix.json; then
            echo "has_targets=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_targets=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: discover
    if: needs.discover.outputs.has_targets == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy ${{ matrix.name }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node .cloudflare/scripts/deploy-app.mjs "${{ matrix.name }}"

      - name: Add deployment summary
        shell: bash
        run: |
          {
            echo "### Deployed ${{ matrix.name }}"
            echo
            echo "- Source folder: `${{ matrix.folder }}`"
            echo "- Expected URL: ${{ matrix.url }}"
          } >> "$GITHUB_STEP_SUMMARY"

  no-op:
    needs: discover
    if: needs.discover.outputs.has_targets != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Explain skip
        run: echo "No deployable app changed."