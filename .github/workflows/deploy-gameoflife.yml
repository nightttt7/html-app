name: Deploy Game of Life to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - gameoflife/**
      - .github/workflows/deploy-gameoflife.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PROJECT_NAME: gameoflife
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Ensure Cloudflare Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          project_url="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${PROJECT_NAME}"
          create_url="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects"

          status_code=$(curl -sS -o cf-project.json -w "%{http_code}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "${project_url}")

          if [ "${status_code}" = "200" ]; then
            echo "Cloudflare Pages project ${PROJECT_NAME} already exists."
            exit 0
          fi

          if [ "${status_code}" != "404" ]; then
            echo "Failed to check Cloudflare Pages project ${PROJECT_NAME}."
            cat cf-project.json
            exit 1
          fi

          echo "Creating Cloudflare Pages project ${PROJECT_NAME}."

          curl -sS -o cf-create.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"name":"'"${PROJECT_NAME}"'","production_branch":"main"}' \
            "${create_url}" > cf-create-status.txt

          create_status=$(cat cf-create-status.txt)
          if [ "${create_status}" != "200" ] && [ "${create_status}" != "201" ]; then
            echo "Failed to create Cloudflare Pages project ${PROJECT_NAME}."
            cat cf-create.json
            exit 1
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy gameoflife --project-name=${{ env.PROJECT_NAME }}