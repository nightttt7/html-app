<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>集装箱竞拍站</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,800&family=Manrope:wght@400;500;700;800&family=IBM+Plex+Mono:wght@500;700&display=swap');

        :root {
            --bg: #f2e7d2;
            --bg-deep: #173e46;
            --panel: rgba(255, 247, 234, 0.86);
            --panel-soft: rgba(255, 251, 243, 0.94);
            --card: rgba(255, 252, 246, 0.96);
            --line: rgba(25, 55, 61, 0.14);
            --text: #1e2629;
            --muted: #657276;
            --accent: #d85d2f;
            --accent-strong: #9f381d;
            --accent-cool: #1f7a74;
            --signal: #e6b34f;
            --success: #1d7b60;
            --danger: #b94739;
            --shadow: 0 24px 60px rgba(69, 57, 34, 0.18);
            --radius: 26px;
            --mono: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
            --display: "Fraunces", Georgia, serif;
            --body: "Manrope", "Segoe UI", sans-serif;
            --floating-action-clearance: 120px;
            --status-header-height: 182px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            position: relative;
            font-family: var(--body);
            color: var(--text);
            background:
                radial-gradient(circle at 12% 18%, rgba(144, 185, 176, 0.18), transparent 24%),
                radial-gradient(circle at 88% 16%, rgba(216, 93, 47, 0.14), transparent 20%),
                linear-gradient(180deg, #dbe7e1 0%, #efe0c7 34%, #f7f0e5 100%);
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
        }

        body::before {
            background:
                repeating-linear-gradient(135deg, rgba(216, 93, 47, 0.06) 0 2px, transparent 2px 28px),
                linear-gradient(90deg, rgba(89, 129, 122, 0.05), transparent 18%, transparent 82%, rgba(89, 129, 122, 0.05));
            opacity: 0.58;
        }

        body::after {
            background:
                radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.55), transparent 22%),
                radial-gradient(circle at 80% 0%, rgba(255, 255, 255, 0.28), transparent 24%);
            mix-blend-mode: soft-light;
        }

        .page {
            width: min(520px, calc(100% - 12px));
            margin: 12px auto;
            padding: 18px 14px var(--floating-action-clearance);
            position: relative;
            border: 1px solid rgba(23, 62, 70, 0.1);
            border-radius: 28px;
            background: linear-gradient(180deg, rgba(255, 249, 239, 0.92), rgba(248, 238, 221, 0.94));
            box-shadow: var(--shadow);
        }

        .page::before {
            content: "";
            position: absolute;
            inset: 10px;
            border: 1px dashed rgba(31, 122, 116, 0.16);
            border-radius: 20px;
            pointer-events: none;
        }

        .hero {
            display: grid;
            gap: 14px;
            margin-bottom: 18px;
            padding-top: calc(var(--status-header-height) + 10px);
        }

        .hero-top {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 10px;
            align-items: start;
        }

        .hero-brand {
            min-width: 0;
        }

        .eyebrow {
            margin: 0;
            color: #fdba74;
            font-size: 0.82rem;
            font-weight: 800;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-size: clamp(1.55rem, 5.8vw, 2.25rem);
            line-height: 1;
            font-family: var(--display);
            letter-spacing: -0.03em;
            color: #14353b;
        }

        .subtitle {
            max-width: 70ch;
            margin: 0;
            color: var(--muted);
            line-height: 1.6;
            font-size: 0.95rem;
            max-width: 58ch;
        }

        .language-switch {
            display: inline-flex;
            gap: 4px;
            padding: 4px;
            border-radius: 999px;
            border: 1px solid rgba(23, 62, 70, 0.16);
            background: rgba(250, 242, 228, 0.92);
            box-shadow: 0 10px 24px rgba(58, 51, 34, 0.08);
            justify-self: end;
            align-self: start;
            white-space: nowrap;
        }

        .language-switch button {
            padding: 8px 12px;
            background: transparent;
            color: #5c6a6d;
        }

        .language-switch button.active {
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            color: #fff6ec;
        }

        .status-header {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: min(492px, calc(100% - 40px));
            z-index: 50;
            overflow: visible;
            margin-bottom: 18px;
            padding: 10px;
            border-radius: 22px;
            border: 1px solid rgba(62, 109, 108, 0.14);
            background: linear-gradient(135deg, rgba(234, 243, 238, 0.98), rgba(194, 223, 216, 0.96));
            box-shadow: 0 18px 32px rgba(81, 91, 79, 0.12);
            backdrop-filter: blur(12px);
        }

        .status-scroll {
            overflow: visible;
            scrollbar-width: none;
        }

        .status-scroll::-webkit-scrollbar {
            display: none;
        }

        .status-stack {
            min-width: 372px;
            display: grid;
            gap: 8px;
        }

        .status-row {
            display: grid;
            gap: 8px;
        }

        .status-row-top {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .status-row-bottom {
            grid-template-columns: repeat(4, minmax(74px, 1fr));
        }

        .panel,
        .lot-card,
        .history-item,
        .warehouse-item,
        .reward-card,
        .section-block,
        .item-chip {
            border: 1px solid var(--line);
            background: var(--card);
            border-radius: var(--radius);
        }

        .status-item {
            position: relative;
            min-height: 76px;
            padding: 12px 12px 11px;
            border: 1px solid rgba(59, 112, 108, 0.12);
            border-radius: 18px;
            background: linear-gradient(180deg, rgba(255, 253, 248, 0.72), rgba(239, 247, 244, 0.62));
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.5);
        }

        .status-label {
            display: block;
            margin-bottom: 6px;
            color: rgba(28, 66, 70, 0.62);
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .status-value {
            display: block;
            font-size: 1rem;
            font-weight: 800;
            line-height: 1.3;
            font-family: var(--mono);
            color: #17444a;
        }

        .status-button {
            width: 100%;
            min-height: 100%;
            padding: 0;
            border: 0;
            border-radius: 0;
            background: transparent;
            color: inherit;
            text-align: left;
        }

        .status-button .status-label,
        .status-button .status-value {
            pointer-events: none;
        }

        .status-bubble {
            position: absolute;
            left: 0;
            top: calc(100% + 10px);
            z-index: 80;
            width: min(320px, calc(100vw - 32px));
            padding: 14px;
            border: 1px solid rgba(18, 58, 65, 0.18);
            border-radius: 18px;
            background: rgba(255, 248, 237, 0.98);
            box-shadow: 0 22px 40px rgba(43, 41, 31, 0.18);
        }

        #rewardSection {
            border: 0;
            padding: 0;
            background: transparent;
            box-shadow: none;
        }

        #auctionPanel.reward-mode #auctionTitle {
            margin-bottom: 2px;
        }

        #auctionPanel.reward-mode #rewardSection {
            margin-top: -4px;
        }

        #auctionPanel.reward-mode #rewardGrid {
            margin-top: 0;
        }

        .status-bubble[hidden] {
            display: none;
        }

        .status-bubble-title {
            margin: 0 0 8px;
            font-size: 0.92rem;
            font-weight: 800;
        }

        .status-bubble-list {
            display: grid;
            gap: 8px;
        }

        .status-bubble-item {
            padding: 10px 12px;
            border-radius: 14px;
            background: rgba(31, 122, 116, 0.08);
            color: var(--text);
            line-height: 1.5;
        }

        .layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        .panel {
            padding: 18px;
            background: linear-gradient(180deg, rgba(255, 248, 236, 0.9), rgba(251, 242, 225, 0.92));
            border-color: rgba(23, 62, 70, 0.12);
            box-shadow: 0 14px 32px rgba(71, 59, 35, 0.08);
        }

        .panel h2,
        .panel h3 {
            margin: 0 0 8px;
        }

        .panel p {
            margin: 0;
            color: var(--muted);
            line-height: 1.6;
        }

        .section-head {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            margin-bottom: 10px;
        }

        .lot-tag,
        .reward-tag,
        .market-tag {
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 700;
            border: 1px solid transparent;
        }

        .phase-badge,
        .lot-tag {
            background: rgba(216, 93, 47, 0.12);
            border-color: rgba(216, 93, 47, 0.16);
            color: var(--accent-strong);
        }

        .reward-tag {
            background: rgba(31, 122, 116, 0.1);
            border-color: rgba(31, 122, 116, 0.16);
            color: #1b6964;
        }

        .market-tag.good {
            background: rgba(29, 123, 96, 0.12);
            color: #1d7b60;
        }

        .market-tag.warn {
            background: rgba(185, 71, 57, 0.12);
            color: #ab4538;
        }

        .market-tag.neutral {
            background: rgba(23, 62, 70, 0.08);
            color: #315057;
        }

        .lot-grid,
        .reward-grid,
        .warehouse-list,
        .history-list,
        .hint-list {
            display: grid;
            gap: 12px;
        }

        .lot-grid,
        .reward-grid {
            grid-template-columns: 1fr;
            margin-top: 18px;
        }

        #rewardGrid {
            margin-top: 10px;
        }

        .lot-card,
        .reward-card,
        .warehouse-item {
            position: relative;
            overflow: hidden;
            padding: 18px;
            display: grid;
            gap: 14px;
            background: linear-gradient(180deg, rgba(255, 252, 246, 0.98), rgba(244, 232, 210, 0.92));
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7), 0 12px 24px rgba(78, 66, 42, 0.08);
        }

        .lot-top,
        .warehouse-top,
        .reward-top,
        .history-head,
        .action-row,
        .result-row {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        .reward-badges {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .duration-tag {
            background: rgba(141, 214, 166, 0.28);
            border-color: rgba(37, 101, 58, 0.18);
            color: #1e5a35;
        }

        .lot-name,
        .warehouse-name {
            margin: 0;
            font-size: 1.1rem;
            font-family: var(--display);
            letter-spacing: -0.02em;
        }

        .small {
            color: var(--muted);
            font-size: 0.9rem;
        }

        .lot-price,
        .warehouse-price {
            font-size: 1.55rem;
            font-weight: 800;
            color: #14353b;
            font-family: var(--mono);
        }

        .hint-list {
            padding-left: 18px;
            margin: 0;
            color: var(--muted);
        }

        .hint-list li {
            line-height: 1.5;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .meta-box {
            padding: 10px 12px;
            border-radius: 18px;
            background: rgba(23, 62, 70, 0.06);
            border: 1px solid rgba(23, 62, 70, 0.08);
        }

        button {
            border: 0;
            border-radius: 999px;
            padding: 12px 16px;
            font: inherit;
            font-weight: 800;
            cursor: pointer;
            transition: transform 160ms ease, opacity 160ms ease, background 160ms ease;
        }

        button:hover:not(:disabled) {
            transform: translateY(-1px);
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.45;
        }

        .bid-button,
        .next-button,
        .sell-button,
        .reward-button {
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            color: #fff8ef;
        }

        .ghost-button,
        .skip-button,
        .phase-button {
            background: rgba(23, 62, 70, 0.08);
            color: var(--text);
            border: 1px solid rgba(23, 62, 70, 0.14);
        }

        .interactive-card {
            cursor: pointer;
            transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
        }

        .interactive-card:hover,
        .interactive-card:focus-visible {
            transform: translateY(-2px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8), 0 18px 32px rgba(67, 54, 32, 0.14);
            border-color: rgba(216, 93, 47, 0.28);
            outline: none;
        }

        .interactive-card-disabled {
            opacity: 0.72;
            cursor: not-allowed;
        }

        .message {
            margin-top: 14px;
            padding: 14px 16px;
            border-radius: 18px;
            background: rgba(23, 62, 70, 0.08);
            color: var(--text);
            min-height: 54px;
        }

        .message.good {
            background: rgba(34, 197, 94, 0.14);
            color: #bbf7d0;
        }

        .message.warn {
            background: rgba(251, 113, 133, 0.14);
            color: #fecdd3;
        }

        .message.info {
            background: rgba(56, 189, 248, 0.12);
            color: #bae6fd;
        }

        .message[hidden] {
            display: none;
        }

        .profit {
            font-weight: 800;
        }

        .profit.positive {
            color: #86efac;
        }

        .profit.negative {
            color: #fda4af;
        }

        .history-item {
            padding: 14px;
            background: rgba(255, 250, 242, 0.94);
        }

        .history-list {
            margin-top: 18px;
        }

        .item-chip {
            padding: 10px 12px;
            background: rgba(56, 189, 248, 0.08);
        }

        .history-toggle {
            margin-top: 24px;
        }

        .history-toggle summary {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 16px;
            cursor: pointer;
            list-style: none;
            border: 1px solid rgba(23, 62, 70, 0.12);
            border-radius: 18px;
            background: rgba(255, 249, 239, 0.96);
            font-weight: 800;
        }

        .history-toggle summary::-webkit-details-marker {
            display: none;
        }

        .history-toggle summary::after {
            content: '▸';
            color: var(--muted);
            transition: transform 160ms ease;
        }

        .history-toggle[open] summary::after {
            transform: rotate(90deg);
        }

        .warehouse-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .footer-note {
            margin-top: 14px;
            color: var(--muted);
        }

        .rules-toggle {
            margin: 0;
        }

        .rules-toggle summary {
            cursor: pointer;
            color: var(--muted);
            font-size: 0.88rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            list-style: none;
            padding: 6px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            user-select: none;
        }

        .rules-row-hint {
            flex: 1;
            text-align: right;
            color: #5c6a6d;
            font-size: 0.72rem;
            letter-spacing: 0.04em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .rules-toggle summary::-webkit-details-marker {
            display: none;
        }

        .rules-toggle summary::after {
            content: '▸';
            font-size: 0.8rem;
            transition: transform 160ms ease;
        }

        .rules-toggle[open] summary::after {
            content: '▾';
        }

        .rules-toggle .subtitle {
            margin-top: 10px;
        }

        .floating-day-button {
            position: fixed;
            right: 24px;
            bottom: 24px;
            z-index: 40;
            padding: 14px 20px;
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            color: #fff8ef;
            box-shadow: 0 20px 40px rgba(114, 53, 31, 0.24);
        }

        .floating-day-button[hidden] {
            display: none;
        }

        @media (max-width: 768px) {
            .page {
                width: calc(100% - 12px);
                margin: 12px auto;
                padding: 18px 14px var(--floating-action-clearance);
                border-radius: 24px;
            }

            .hero {
                padding-top: calc(var(--status-header-height) + 6px);
            }

            .hero-top {
                grid-template-columns: minmax(0, 1fr) auto;
                align-items: start;
            }

            .rules-row-hint {
                max-width: 56%;
            }

            .status-item {
                min-height: auto;
            }

            .status-stack {
                min-width: 0;
                gap: 6px;
            }

            .status-row {
                gap: 6px;
            }

            .status-bubble {
                width: 100%;
            }

            .status-header {
                top: 8px;
                width: calc(100% - 24px);
                padding: 8px;
            }

            .status-item {
                padding: 10px 10px 9px;
            }

            .status-label {
                margin-bottom: 5px;
                font-size: 0.68rem;
                letter-spacing: 0.06em;
            }

            .status-value {
                font-size: 0.95rem;
            }

            .floating-day-button {
                right: 14px;
                bottom: 14px;
                padding: 14px 18px;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="hero">
            <div class="hero-top">
                <div class="hero-brand">
                    <h1 id="heroTitle">集装箱竞拍站</h1>
                </div>
                <div class="language-switch" role="group" aria-label="Language selector">
                    <button type="button" id="langZhButton" class="active" aria-label="Switch to Chinese">中文</button>
                    <button type="button" id="langEnButton" aria-label="Switch to English">English</button>
                </div>
            </div>
            <details class="rules-toggle" id="rulesToggle">
                <summary>
                    <span id="rulesSummary">游戏说明</span>
                    <span class="rules-row-hint" id="interactionHint">通过点击卡片来买下、卖掉、选择</span>
                </summary>
                <p class="subtitle" id="heroSubtitle">按天推进：先买柜子（不能卖货），再卖货，然后结束当天（需要有足够钱支付牌照费），系统扣费后进入选奖励，奖励选好后自动进入下一天。现金达到 $10,000 即获胜。</p>
            </details>
            <section class="status-header">
                <div class="status-scroll">
                    <div class="status-stack">
                        <div class="status-row status-row-top">
                            <article class="status-item">
                                <span class="status-label" id="netWorthLabel">总资产</span>
                                <strong class="status-value" id="netWorthValue">$0</strong>
                            </article>
                            <article class="status-item">
                                <span class="status-label" id="warehouseCostLabel">仓库费用</span>
                                <strong class="status-value" id="warehouseCostValue">$0</strong>
                            </article>
                            <article class="status-item">
                                <button class="status-button" id="appliedRewardsButton" type="button" aria-expanded="false" aria-controls="appliedRewardsBubble">
                                    <span class="status-label" id="appliedRewardsLabel">生效奖励</span>
                                    <strong class="status-value" id="appliedRewardsValue">0</strong>
                                </button>
                                <div class="status-bubble" id="appliedRewardsBubble" hidden></div>
                            </article>
                        </div>
                        <div class="status-row status-row-bottom">
                            <article class="status-item">
                                <span class="status-label" id="cashLabel">现金</span>
                                <strong class="status-value" id="cashValue">$0</strong>
                            </article>
                            <article class="status-item">
                                <span class="status-label" id="openedLabel">库存卖价</span>
                                <strong class="status-value" id="openedValue">$0</strong>
                            </article>
                            <article class="status-item">
                                <span class="status-label" id="roundLabel">天数</span>
                                <strong class="status-value" id="roundValue">D1</strong>
                            </article>
                            <article class="status-item">
                                <span class="status-label" id="licenseLabel">牌照费用</span>
                                <strong class="status-value" id="licenseValue">$0</strong>
                            </article>
                        </div>
                    </div>
                </div>
            </section>
        </section>

        <section class="layout">
            <section class="panel" id="auctionPanel">
                <h2 id="auctionTitle">今日竞拍</h2>

                <div class="lot-grid" id="lotGrid"></div>
                <div class="action-row" id="skipAuctionRow" style="margin-top: 18px;">
                    <button class="skip-button" id="skipAuctionButton">今天不买</button>
                </div>
                <div class="message" id="messageBox" hidden></div>

                <section class="section-block" id="rewardSection" hidden>
                    <div class="reward-grid" id="rewardGrid"></div>
                    <div class="action-row" style="margin-top: 14px;">
                        <button class="skip-button" id="skipRewardButton">放弃奖励</button>
                    </div>
                </section>
            </section>

            <aside class="panel">
                <h2 id="warehouseLogTitle">仓库</h2>
                <div id="warehouseContent">
                    <div class="warehouse-list" id="warehouseList" style="margin-top: 18px;"></div>
                    <div class="small" id="warehouseSummary" style="margin-top: 14px;"></div>
                </div>

                <details class="history-toggle" id="historyToggle">
                    <summary id="historyTitle" aria-expanded="false">经营记录</summary>
                    <div class="history-list" id="historyList"></div>
                </details>
            </aside>
        </section>
    </main>
    <button class="floating-day-button" id="dayActionButton" type="button">结束今天</button>

    <script>
        const STARTING_CASH = 2800;
        const WIN_CASH = 10000;
        const MIN_BID_PRICE = 180;
        const CONTAINER_GROWTH = 1.055;

        function formatMoney(value) {
            return `$${Math.round(value).toLocaleString(state.language === "zh" ? "zh-CN" : "en-US")}`;
        }

        function localize(zhText, enText) {
            return state.language === "zh" ? (zhText ?? enText ?? "") : (enText ?? zhText ?? "");
        }

        function parsePairText(text) {
            const delimiter = " / ";
            const delimiterIndex = text.indexOf(delimiter);
            if (delimiterIndex === -1) {
                return { zh: text, en: text };
            }

            return {
                en: text.slice(0, delimiterIndex),
                zh: text.slice(delimiterIndex + delimiter.length),
            };
        }

        function localizePairText(text) {
            const pair = parsePairText(text);
            return localize(pair.zh, pair.en);
        }

        function localizeItemName(item) {
            return localize(item.nameZh ?? item.name, item.nameEn ?? item.name);

            return {

                en: `${days} day${days > 1 ? "s" : ""}`,
            };
        }

        function formatDuration(days) {
            const durationText = getDurationText(days);
            return localize(durationText.zh, durationText.en);
        }

        function randomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function randomFloatBetween(min, max) {
            return Math.random() * (max - min) + min;
        }

        function clamp(value, min, max) {
            return Math.min(max, Math.max(min, value));
        }

        function shuffle(items) {
            const shuffled = [...items];

            for (let currentIndex = shuffled.length - 1; currentIndex > 0; currentIndex -= 1) {
                const randomIndex = randomInt(0, currentIndex);
                [shuffled[currentIndex], shuffled[randomIndex]] = [shuffled[randomIndex], shuffled[currentIndex]];
            }

            return shuffled;
        }

        function createDayEffects() {
            return {
                lotDiscount: 0,
                storageFree: false,
                marketBoost: 0,
                licenseDiscount: 0,
                extraLuckyLots: 0,
                dailyCash: 0,
            };
        }

        function addHistory(titleZh, titleEn, detailZh, detailEn, amount = null) {
            state.history.unshift({ titleZh, titleEn, detailZh, detailEn, amount });
            state.history = state.history.slice(0, MAX_HISTORY_ENTRIES);
        }

        function licenseFeeForRound(round) {
            if (round <= 1) {
                return 0;
            }

            const elapsedRounds = round - 2;
            return Math.round(BASE_LICENSE_FEE * Math.pow(LICENSE_GROWTH, elapsedRounds) + elapsedRounds * LICENSE_STEP);
        }

        function appraisedGrowth(round) {
            return Math.pow(CONTAINER_GROWTH, round - 1);
        }

        function marketGrowth(round) {
            return Math.pow(MARKET_GROWTH, round - 1);
        }

        function pickTemplate(predicate = null) {
            const pool = predicate ? containerTemplates.filter(predicate) : containerTemplates;
            const options = pool.length > 0 ? pool : containerTemplates;
            return options[randomInt(0, options.length - 1)];
        }

        function buildLot(predicate = null) {
            const template = pickTemplate(predicate);
            const itemCount = randomInt(2, 4);
            const chosenItems = shuffle(template.items).slice(0, itemCount);
            const items = chosenItems.map((item) => ({
                id: ++state.itemId,
                nameZh: item.nameZh,
                nameEn: item.nameEn,
                marketKey: item.nameEn,
                appraisal: Math.round(randomInt(item.min, item.max) * appraisedGrowth(state.round)),
                storageFee: item.storage,
                swing: item.swing,
                acquiredRound: state.round,
                currentPrice: 0,
            }));
            const appraisalTotal = items.reduce((sum, item) => sum + item.appraisal, 0);
            const priceRatio = template.priceBias + randomFloatBetween(-0.08, 0.18) + (state.round - 1) * 0.006;
            const discountMultiplier = 1 - state.dayEffects.lotDiscount;

            return {
                nameZh: template.nameZh,
                nameEn: template.nameEn,
                risk: template.risk,
                riskLabel: template.riskLabel,
                clue: template.clue,
                hints: template.hints,
                items,
                appraisalTotal,
                storageTotal: items.reduce((sum, item) => sum + item.storageFee, 0),
                bid: Math.max(MIN_BID_PRICE, Math.round(appraisalTotal * priceRatio * discountMultiplier)),
            };
        }

        function generateRewardOptions() {
            state.rewardOptions = shuffle(rewardPool).slice(0, 3).map((reward) => ({

                duration: randomInt(1, 3),

        function createActiveReward(reward) {
            return {
                rewardId: reward.id,
                nameZh: reward.nameZh,
                nameEn: reward.nameEn,
                remainingDays: reward.duration,
                duration: reward.duration,
                value: reward.value ?? 0,

        function tickActiveRewards() {
            state.activeRewards = state.activeRewards
                .map((reward) => ({

                    remainingDays: reward.remainingDays - 1,
                }))
                .filter((reward) => reward.remainingDays > 0);
        }

        function applyActiveRewards() {
            const effects = createDayEffects();

            state.activeRewards.forEach((instance) => {
                const reward = rewardCatalog[instance.rewardId];

                if (reward) {
                    reward.applyDayEffect(effects, instance);
                }
            });

            effects.lotDiscount = clamp(effects.lotDiscount, 0, 0.45);
            effects.marketBoost = clamp(effects.marketBoost, 0, 1.4);
            effects.licenseDiscount = clamp(effects.licenseDiscount, 0, 0.45);
            effects.extraLuckyLots = Math.min(effects.extraLuckyLots, 2);
            state.dayEffects = effects;
        }

        function describeActiveReward(instance) {
            const reward = rewardCatalog[instance.rewardId];

            return reward
                ? reward.describeActive(instance)
                : {
                    zh: `${instance.nameZh} · 剩 ${instance.remainingDays} 天`,
                    en: `${instance.nameEn} · ${instance.remainingDays} day(s) left`,
                };
        }

        function buildMarketTable() {
            state.marketTable = {};

            Object.values(itemCatalog).forEach((item) => {
                const multiplier = clamp(
                    marketGrowth(state.round) * (1 + randomFloatBetween(-item.swing, item.swing) + state.dayEffects.marketBoost),
                    MIN_MARKET_MULTIPLIER,
                    MAX_MARKET_MULTIPLIER,
                );

                state.marketTable[item.nameEn] = multiplier;
            });
        }

        function refreshInventoryPrices() {
            state.inventory.forEach((item) => {
                const multiplier = state.marketTable[item.marketKey] || 1;
                item.currentPrice = Math.max(25, Math.round(item.appraisal * multiplier));
            });
        }

        function generateLots() {
            const totalLots = 3 + state.dayEffects.extraLuckyLots;
            state.lots = Array.from({ length: totalLots }, () => buildLot());

            for (let index = 0; index < state.dayEffects.extraLuckyLots; index += 1) {
                state.lots[state.lots.length - 1 - index] = buildLot((template) => template.riskLabel === "Lucky");
            }

            if (state.cash >= MIN_BID_PRICE && state.lots.every((lot) => lot.bid > state.cash)) {
                state.lots.sort((left, right) => left.bid - right.bid);
                state.lots[0].bid = Math.max(MIN_BID_PRICE, Math.floor(state.cash * 0.82));
            }
        }

        function calculateStorageFee() {
            return state.inventory.reduce((sum, item) => sum + item.storageFee, 0);
        }

        function calculateNetWorth() {
            return state.cash + state.inventory.reduce((sum, item) => sum + item.currentPrice, 0);
        }

        function describeMarket(item) {
            const ratio = item.currentPrice / item.appraisal;

            if (ratio >= 1.25) {
                return { labelZh: "热卖", labelEn: "Hot", tone: "good" };
            }

            if (ratio >= 1.08) {
                return { labelZh: "顺价", labelEn: "Firm", tone: "good" };
            }

            if (ratio <= 0.85) {
                return { labelZh: "冷门", labelEn: "Cold", tone: "warn" };
            }

            return { labelZh: "平盘", labelEn: "Flat", tone: "neutral" };
        }

        function getDiscountedLicenseFee() {
            const nextBaseFee = licenseFeeForRound(state.round + 1);
            return Math.round(nextBaseFee * (1 - state.dayEffects.licenseDiscount));
        }

            const phaseTitles = {
                auction: localize("今日竞拍", "Daily Auction"),
                reward: localize("选择奖励", "Choose Reward"),
            };
            auctionTitle.textContent = phaseTitles[state.phase] || localize("今日操作", "Action");
            auctionTitle.hidden = false;
            warehouseLogTitle.textContent = localize("仓库", "Warehouse");
            historyTitle.textContent = localize("经营记录", "History");

            skipAuctionButton.textContent = localize("今天不买", "Skip Buying");
            skipRewardButton.textContent = localize("放弃奖励", "Skip Reward");

            langZhButton.classList.toggle("active", state.language === "zh");
            langEnButton.classList.toggle("active", state.language === "en");
        }

        function renderStats() {
            const appraisalTotal = state.inventory.reduce((sum, item) => sum + item.appraisal, 0);
            const currentTotal = state.inventory.reduce((sum, item) => sum + item.currentPrice, 0);
            const storageFee = calculateStorageFee();
            cashValue.textContent = formatMoney(state.cash);
            netWorthValue.textContent = formatMoney(calculateNetWorth());
            openedValue.textContent = formatMoney(currentTotal);
            roundValue.textContent = `D${state.round}`;
            licenseValue.textContent = formatMoney(getDiscountedLicenseFee());
            warehouseCostValue.textContent = formatMoney(storageFee);
        }

        function renderEffects() {
            const activeEntries = state.activeRewards.map((reward) => describeActiveReward(reward));

            appliedRewardsValue.textContent = activeEntries.length;

            renderRewardBubble(
                appliedRewardsButton,
                appliedRewardsBubble,
                localize("当前生效奖励", "Current Active Rewards"),
                activeEntries,
                localize("当前没有生效中的奖励。", "No rewards are active right now."),
            );
        }

        function renderRewardBubble(button, bubble, title, entries, emptyText) {
            const listHtml = entries.length > 0
                ? entries.map((entry) => `<div class="status-bubble-item">${localize(entry.zh, entry.en)}</div>`).join("")
                : `<div class="status-bubble-item">${emptyText}</div>`;

            bubble.innerHTML = `
                <div class="status-bubble-title">${title}</div>
                <div class="status-bubble-list">${listHtml}</div>
            `;
            button.setAttribute("aria-label", `${title}: ${entries.length}`);
        }

        function makeInteractiveCard(card, options) {
            const {
                enabled,
                onActivate,
                labelZh,
                labelEn,
            } = options;

            card.classList.add("interactive-card");

            if (!enabled) {
                card.classList.add("interactive-card-disabled");
                card.setAttribute("aria-disabled", "true");
                return;
            }

            card.tabIndex = 0;
            card.setAttribute("role", "button");
            card.setAttribute("aria-label", localize(labelZh, labelEn));
            card.addEventListener("click", onActivate);
            card.addEventListener("keydown", (event) => {
                if (event.key === "Enter" || event.key === " ") {
                    event.preventDefault();
                    onActivate();
                }
            });
        }

        function renderLots() {
            lotGrid.innerHTML = "";

            if (state.phase !== "auction" || state.gameOver || state.victory) {
                return;
            }

            state.lots.forEach((lot, index) => {
                const card = document.createElement("article");
                card.className = "lot-card";
                card.innerHTML = `
                    <div class="lot-top">
                        <div>
                            <span class="lot-tag">${localize(lot.risk, lot.riskLabel)}</span>
                            <h3 class="lot-name">${localize(lot.nameZh, lot.nameEn)}</h3>
                        </div>
                        <strong class="lot-price">${formatMoney(lot.bid)}</strong>
                    </div>
                    <div class="small">${localizePairText(lot.clue)}</div>
                    <ul class="hint-list">
                        ${lot.hints.map((hint) => `<li>${localizePairText(hint)}</li>`).join("")}
                    </ul>
                    <div class="meta-grid">
                        <div class="meta-box small">${localize(`货物数：${lot.items.length}`, `Items: ${lot.items.length}`)}</div>
                        <div class="meta-box small">${localize(`仓储预估：${formatMoney(lot.storageTotal)}`, `Storage: ${formatMoney(lot.storageTotal)}`)}</div>
                    </div>
                `;

                const canBuy = state.phase === "auction" && state.cash >= lot.bid && !state.gameOver && !state.victory;
                makeInteractiveCard(card, {
                    enabled: canBuy,
                    onActivate: () => buyLot(index),
                    labelZh: `点击买下 ${lot.nameZh}`,
                    labelEn: `Tap to buy ${lot.nameEn}`,
                });
                lotGrid.appendChild(card);
            });
        }

        function renderRewardOptions() {
            rewardGrid.innerHTML = "";
            rewardSection.hidden = state.phase !== "reward";

            state.rewardOptions.forEach((reward) => {
                const card = document.createElement("article");
                card.className = "reward-card";
                card.innerHTML = `
                    <div class="reward-top">
                        <div>
                            <div class="reward-badges">
                                <span class="reward-tag">${localize(reward.nameZh, reward.nameEn)}</span>
                                <span class="reward-tag duration-tag">${formatDuration(reward.duration)}</span>
                            </div>
                            <h3 style="margin: 10px 0 0;">${localize(reward.nameZh, reward.nameEn)}</h3>
                        </div>
                        <strong>${reward.cost > 0 ? formatMoney(reward.cost) : localize("免费", "Free")}</strong>
                    </div>
                    <div class="small">${localizePairText(reward.description)}</div>
                `;

                const canClaim = state.phase === "reward" && reward.cost <= state.cash && !state.gameOver && !state.victory;
                makeInteractiveCard(card, {
                    enabled: canClaim,
                    onActivate: () => chooseReward(reward.id),
                    labelZh: `点击选择 ${reward.nameZh}`,
                    labelEn: `Tap to claim ${reward.nameEn}`,
                });
                rewardGrid.appendChild(card);
            });
        }

        function renderWarehouse() {
            warehouseList.innerHTML = "";

            if (state.inventory.length === 0) {
                const empty = document.createElement("div");
                empty.className = "history-item";
                empty.innerHTML = `
                    <strong>${localize("仓库空空", "Warehouse empty")}</strong>
                    <div class='small' style='margin-top: 6px;'>${localize("先买柜子进货，或者干脆跳过一天保住资金。", "Buy a lot to stock up, or skip today and preserve cash.")}</div>
                `;
                warehouseList.appendChild(empty);
            } else {
                state.inventory.forEach((item) => {
                    const market = describeMarket(item);
                    const element = document.createElement("article");
                    element.className = "warehouse-item";
                    element.innerHTML = `
                        <div class="warehouse-top">
                            <div>
                                <span class="market-tag ${market.tone}">${localize(market.labelZh, market.labelEn)}</span>
                                <h3 class="warehouse-name">${localizeItemName(item)}</h3>
                                <div class="small">${localize(`第 ${item.acquiredRound} 天入库`, `Stored on day ${item.acquiredRound}`)}</div>
                            </div>
                            <strong class="warehouse-price">${formatMoney(item.currentPrice)}</strong>
                        </div>
                        <div class="meta-grid">
                            <div class="meta-box small">${localize(`估价：${formatMoney(item.appraisal)}`, `Appraisal: ${formatMoney(item.appraisal)}`)}</div>
                            <div class="meta-box small">${localize(`过夜仓储：${formatMoney(item.storageFee)}`, `Storage: ${formatMoney(item.storageFee)}`)}</div>
                        </div>
                    `;

                    const canSell = state.phase === "sales" && !state.gameOver && !state.victory;
                    makeInteractiveCard(element, {
                        enabled: canSell,
                        onActivate: () => sellItem(item.id),
                        labelZh: `点击卖掉 ${item.nameZh}`,
                        labelEn: `Tap to sell ${item.nameEn}`,
                    });
                    warehouseList.appendChild(element);
                });
            }

            const storageFee = calculateStorageFee();
            const currentOfferTotal = state.inventory.reduce((sum, item) => sum + item.currentPrice, 0);
            warehouseSummary.textContent = localize(
                `今日仓库总卖价 ${formatMoney(currentOfferTotal)}，过夜仓储 ${formatMoney(storageFee)}`,
                `Warehouse offer total ${formatMoney(currentOfferTotal)} · overnight storage ${formatMoney(storageFee)}`,
            );
        }

        function renderHistory() {
            historyList.innerHTML = "";

            if (state.history.length === 0) {
                const empty = document.createElement("div");
                empty.className = "history-item";
                empty.innerHTML = `
                    <strong>${localize("还没有操作记录", "No actions yet")}</strong>
                    <div class='small' style='margin-top: 6px;'>${localize("这里会记录买箱、卖货、奖励和每天扣的费用。", "The log tracks purchases, sales, rewards, and daily fees.")}</div>
                `;
                historyList.appendChild(empty);
                return;
            }

            state.history.forEach((entry) => {
                const element = document.createElement("article");
                element.className = "history-item";
                const amountClass = entry.amount === null ? "" : entry.amount >= 0 ? "profit positive" : "profit negative";
                const amountText = entry.amount === null ? "" : `${entry.amount >= 0 ? "+" : "-"}${formatMoney(Math.abs(entry.amount))}`;
                element.innerHTML = `
                    <div class="history-head">
                        <div>
                            <strong>${localize(entry.titleZh, entry.titleEn)}</strong>
                            <div class="small">${localize(entry.detailZh, entry.detailEn)}</div>
                        </div>
                        <span class="${amountClass}">${amountText}</span>
                    </div>
                `;
                historyList.appendChild(element);
            });
        }

        function renderPhase() {
            const isAuction = state.phase === "auction" && !state.gameOver && !state.victory;
            skipAuctionRow.hidden = !isAuction;
            skipAuctionButton.hidden = !isAuction;
            skipAuctionButton.disabled = !isAuction;
            skipRewardButton.disabled = state.phase !== "reward" || state.gameOver || state.victory;
            auctionPanel.classList.toggle("reward-mode", state.phase === "reward" && !state.gameOver && !state.victory);

            const showWarehouse = state.phase === "sales" && !state.gameOver && !state.victory;
            auctionPanel.hidden = state.phase === "sales" && !state.gameOver && !state.victory;
            warehouseContent.hidden = !showWarehouse;
            lotGrid.hidden = state.phase !== "auction" || state.gameOver || state.victory;
        }

        function renderDayAction() {
            if (state.gameOver || state.victory) {
                dayActionButton.hidden = true;
                return;
            }

            if (state.phase === "sales") {
                dayActionButton.hidden = false;
                dayActionButton.disabled = false;
                dayActionButton.textContent = localize("结束今天", "End Today");
                return;
            }

            dayActionButton.hidden = true;
        }

        function render() {
            renderStaticText();
            renderStats();
            renderEffects();
            renderPhase();
            renderMessage();
            renderLots();
            renderRewardOptions();
            renderWarehouse();
            renderHistory();
            renderDayAction();
        }

        function startDay() {
            state.phase = "auction";
            state.chosenLotName = "";
            applyActiveRewards();

            if (state.dayEffects.dailyCash > 0) {
                state.cash += state.dayEffects.dailyCash;
                addHistory(
                    `第 ${state.round} 天奖励入账`,
                    `Day ${state.round} reward payout`,
                    `生效奖励带来 ${formatMoney(state.dayEffects.dailyCash)}`,
                    `Active rewards paid ${formatMoney(state.dayEffects.dailyCash)}`,
                    state.dayEffects.dailyCash,
                );
            }

            buildMarketTable();
            refreshInventoryPrices();
            generateLots();
            generateRewardOptions();
        }

        function checkForVictory() {
            if (state.cash >= WIN_CASH) {
                state.victory = true;
                state.phase = "done";
                setMessage(
                    `你已经攒到 ${formatMoney(state.cash)}，成功通关。`,
                    `You hit ${formatMoney(state.cash)} and won the run.`,
                    "good",
                );
                render();
                return true;
            }

            return false;
        }

        function buyLot(index) {
            if (state.phase !== "auction" || state.gameOver || state.victory) {
                return;
            }

            const lot = state.lots[index];

            if (!lot || lot.bid > state.cash) {
                setMessage("这只柜子现在买不起。", "You cannot afford this lot.", "warn");
                render();
                return;
            }

            state.cash -= lot.bid;
            state.opened += 1;
            state.inventory.push(...lot.items);
            refreshInventoryPrices();
            state.phase = "sales";
            state.chosenLotName = localize(lot.nameZh, lot.nameEn);
            addHistory(
                `第 ${state.round} 天买下 ${lot.nameZh}`,
                `Day ${state.round} bought ${lot.nameEn}`,
                `${lot.items.length} 件货物入库`,
                `${lot.items.length} items entered the warehouse`,
                -lot.bid,
            );
            setMessage(
                `你拍下了「${lot.nameZh}」，货物已经入库，可以今天卖，也可以囤着。`,
                `Opened "${lot.nameEn}". The goods are now in your warehouse, ready to sell or hold.`,
                "good",
            );
            render();
            checkForVictory();
        }

        function skipAuction() {
            if (state.phase !== "auction" || state.gameOver || state.victory) {
                return;
            }

            state.phase = "sales";
            addHistory(
                `第 ${state.round} 天跳过竞拍`,
                `Day ${state.round} skipped the auction`,
                "今天没有买柜子",
                "No container bought today",
            );
            setMessage(
                "你今天没有买柜子，可以处理仓库库存，准备好后再结束今天。",
                "You skipped buying today. Sell what you have, then end the day when ready.",
                "info",
            );
            render();
        }

        function sellItem(itemId) {
            if (state.phase !== "sales" || state.gameOver || state.victory) {
                return;
            }

            const itemIndex = state.inventory.findIndex((item) => item.id === itemId);

            if (itemIndex === -1) {
                return;
            }

            const item = state.inventory[itemIndex];
            state.cash += item.currentPrice;
            state.inventory.splice(itemIndex, 1);
            addHistory(
                `第 ${state.round} 天卖出 ${item.nameZh}`,
                `Day ${state.round} sold ${item.nameEn}`,
                `以 ${formatMoney(item.currentPrice)} 卖出`,
                `Sold for ${formatMoney(item.currentPrice)}`,
                item.currentPrice,
            );
            setMessage(
                `你以 ${formatMoney(item.currentPrice)} 卖出了 ${item.nameZh}。`,
                `Sold ${item.nameEn} for ${formatMoney(item.currentPrice)}.`,
                item.currentPrice >= item.appraisal ? "good" : "info",
            );
            refreshInventoryPrices();
            render();
            checkForVictory();
        }

        function endToday() {
            if (state.gameOver || state.victory || state.phase !== "sales") {
                return;
            }

            const licenseFee = getDiscountedLicenseFee();

            if (state.cash < licenseFee) {
                if (state.inventory.length === 0) {
                    endRun(
                        "卖完所有货物依然付不起牌照费，本局失败。",
                        "Sold everything but still can't cover the license fee. Run over.",
                    );
                } else {
                    setMessage(
                        `现金不足以支付牌照费 ${formatMoney(licenseFee)}，请先卖货凑钱（仓库还有 ${state.inventory.length} 件）。`,
                        `Need ${formatMoney(licenseFee)} for the license fee. Sell more goods first (${state.inventory.length} item(s) left).`,
                        "warn",
                    );
                    render();
                }
                return;
            }

            const storageFee = state.dayEffects.storageFree ? 0 : calculateStorageFee();
            state.cash -= storageFee;
            state.cash -= licenseFee;

            addHistory(
                `第 ${state.round} 天结算`,
                `Day ${state.round} settlement`,
                `仓储 ${formatMoney(storageFee)} · 牌照 ${formatMoney(licenseFee)}`,
                `Storage ${formatMoney(storageFee)} · License ${formatMoney(licenseFee)}`,
                -(storageFee + licenseFee),
            );

            if (state.cash < 0) {
                endRun("结算费用后资金不足，本局失败。", "Settlement deducted too much. Run over.");
                return;
            }

            state.phase = "reward";
            setMessage(
                "今天结算完成，可以选择一条奖励，也可以直接放弃。",
                "Settlement complete. Choose a reward or skip it.",
                "info",
            );
            render();
        }

        function advanceToNextDay(selectedReward = null) {
            tickActiveRewards();

            if (selectedReward) {
                state.activeRewards.push(createActiveReward(selectedReward));
            }

            state.round += 1;
            startDay();

            if (checkForVictory()) {
                return;
            }

            if (selectedReward) {
                setMessage(
                    `第 ${state.round} 天开始，奖励「${selectedReward.nameZh}」生效 ${selectedReward.duration} 天。`,
                    `Day ${state.round} begins. "${selectedReward.nameEn}" is active for ${selectedReward.duration} day(s).`,
                    "info",
                );
            } else {
                setMessage(
                    `第 ${state.round} 天开始。`,
                    `Day ${state.round} begins.`,
                    "info",
                );
            }
            render();
        }

        function chooseReward(rewardId) {
            if (state.phase !== "reward" || state.gameOver || state.victory) {
                return;
            }

            const reward = state.rewardOptions.find((entry) => entry.id === rewardId);

            if (!reward || reward.cost > state.cash) {
                setMessage("这条奖励现在买不起。", "You cannot afford this reward.", "warn");
                render();
                return;
            }

            const rewardDescription = parsePairText(reward.description);
            const rewardDuration = getDurationText(reward.duration);
            state.cash -= reward.cost;

            addHistory(
                `第 ${state.round} 天奖励：${reward.nameZh}`,
                `Day ${state.round} reward: ${reward.nameEn}`,
                `${reward.nameZh} · ${rewardDuration.zh} · ${rewardDescription.zh}`,
                `${reward.nameEn} · ${rewardDuration.en} · ${rewardDescription.en}`,
                reward.cost > 0 ? -reward.cost : null,
            );

            if (checkForVictory()) {
                return;
            }

            advanceToNextDay(reward);
        }

        function skipReward() {
            if (state.phase !== "reward" || state.gameOver || state.victory) {
                return;
            }

            addHistory(
                `第 ${state.round} 天放弃奖励`,
                `Day ${state.round} skipped reward`,
                "今天没有拿额外奖励",
                "No extra reward chosen today",
            );

            advanceToNextDay();
        }

        function endRun(zhText, enText) {
            state.gameOver = true;
            state.phase = "done";
            setMessage(zhText, enText, "warn");
            render();
        }

        skipAuctionButton.addEventListener("click", skipAuction);
        skipRewardButton.addEventListener("click", skipReward);
        dayActionButton.addEventListener("click", endToday);
        langZhButton.addEventListener("click", () => setLanguage("zh"));
        langEnButton.addEventListener("click", () => setLanguage("en"));
        appliedRewardsButton.addEventListener("click", (event) => {
            event.stopPropagation();
            const shouldOpen = appliedRewardsBubble.hidden;
            appliedRewardsBubble.hidden = !shouldOpen;
            appliedRewardsButton.setAttribute("aria-expanded", String(shouldOpen));
        });
        historyToggle.addEventListener("toggle", () => {
            historyTitle.setAttribute("aria-expanded", String(historyToggle.open));
        });
        document.addEventListener("click", () => {
            appliedRewardsBubble.hidden = true;
            appliedRewardsButton.setAttribute("aria-expanded", "false");
        });

        addHistory(
            "开局",
            "Run started",
            `起始现金 ${formatMoney(STARTING_CASH)}，攒到 ${formatMoney(WIN_CASH)} 即胜利`,
            `Starting cash ${formatMoney(STARTING_CASH)} · reach ${formatMoney(WIN_CASH)} to win`,
        );
        startDay();
        setMessage(
            "第 1 天开始：先决定买哪只柜子，或者直接跳过。",
            "Day 1 is live. Buy one container or skip, then manage your warehouse.",
            "info",
        );
        render();
    </script>
</body>
</html>
